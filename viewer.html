<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상세페이지 검토 결과</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .badge {
      background: #e53e3e;
      color: #fff;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 56px);
    }

    /* Image side */
    #canvas-area {
      flex: 1;
      overflow: auto;
      padding: 24px;
      background: #e8ecf0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #image-wrapper {
      position: relative;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
      border-radius: 4px;
      overflow: hidden;
      line-height: 0;
    }

    #bg-image {
      display: block;
      max-width: 100%;
      user-select: none;
      pointer-events: none;
    }

    #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    /* Sidebar */
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: #f8f9fa;
      border-left: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      font-size: .88rem;
      font-weight: 700;
      color: #2d3748;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #annotation-count { font-size: .78rem; color: #718096; font-weight: 400; }

    #comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #comment-list:empty::after {
      content: '주석이 없습니다.';
      display: block;
      text-align: center;
      color: #a0aec0;
      font-size: .82rem;
      margin-top: 40px;
    }

    .comment-card {
      background: #fff;
      border-radius: 8px;
      border-left: 4px solid #ccc;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      transition: box-shadow .15s, transform .15s;
      cursor: pointer;
    }

    .comment-card:hover, .comment-card.highlighted {
      box-shadow: 0 3px 12px rgba(0,0,0,.13);
      transform: translateX(2px);
    }
    .comment-card.highlighted { background: #fffbe6; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #1a1a2e;
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-label { font-size: .82rem; font-weight: 600; color: #2d3748; flex: 1; }

    .card-comment {
      font-size: .8rem;
      color: #4a5568;
      line-height: 1.5;
      white-space: pre-wrap;
      background: #f8f9fa;
      padding: 6px 8px;
      border-radius: 5px;
      border: 1px solid #e2e8f0;
      min-height: 36px;
    }

    .card-comment:empty::after {
      content: '(의견 없음)';
      color: #cbd5e0;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      color: #718096;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      color: #e53e3e;
      font-size: .95rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🖼 상세페이지 검토 결과</h1>
  <span class="badge">읽기 전용</span>
</header>

<div id="main">
  <div id="canvas-area">
    <div id="loading">
      <div class="spinner"></div>
      <span>불러오는 중...</span>
    </div>
    <div id="error-msg">
      <span>⚠️</span>
      <span id="error-text">링크가 만료되었거나 존재하지 않습니다.</span>
    </div>
    <div id="image-wrapper" style="display:none">
      <img id="bg-image" alt="상세페이지" draggable="false" />
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      주석 목록
      <span id="annotation-count">0개</span>
    </div>
    <div id="comment-list"></div>
  </div>
</div>

<script>
(() => {
  const id = location.pathname.split('/').pop();
  const bgImage = document.getElementById('bg-image');
  const drawCanvas = document.getElementById('draw-canvas');
  const ctx = drawCanvas.getContext('2d');
  const imageWrapper = document.getElementById('image-wrapper');
  const commentList = document.getElementById('comment-list');
  const annotCount = document.getElementById('annotation-count');
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');

  let annotations = [];
  let hoveredId = null;

  fetch(`/api/view/${id}`)
    .then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(d.error)))
    .then(data => {
      annotations = data.annotations;
      bgImage.onload = () => {
        loading.style.display = 'none';
        imageWrapper.style.display = 'inline-block';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          syncCanvas();
          render();
          buildSidebar();
        }));
      };
      bgImage.src = data.imageDataUrl;
    })
    .catch(err => {
      loading.style.display = 'none';
      errorText.textContent = err || '링크가 만료되었거나 존재하지 않습니다.';
      errorMsg.style.display = 'flex';
    });

  function syncCanvas() {
    drawCanvas.width = bgImage.offsetWidth;
    drawCanvas.height = bgImage.offsetHeight;
  }

  window.addEventListener('resize', () => { syncCanvas(); render(); });

  function render() {
    const cw = drawCanvas.width, ch = drawCanvas.height;
    ctx.clearRect(0, 0, cw, ch);
    annotations.forEach(a => drawBox(a, cw, ch, a.id === hoveredId));
  }

  function drawBox(a, cw, ch, highlighted) {
    const rx = a.x * cw, ry = a.y * ch, rw = a.width * cw, rh = a.height * ch;
    ctx.save();
    ctx.fillStyle = a.color;
    ctx.globalAlpha = highlighted ? 0.18 : 0.10;
    ctx.fillRect(rx, ry, rw, rh);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = a.color;
    ctx.lineWidth = highlighted ? 3 : 2;
    ctx.setLineDash([]);
    ctx.strokeRect(rx, ry, rw, rh);

    const bSize = 20;
    const bx = rx + 2;
    const by = ry - bSize - 2 < 0 ? ry + 2 : ry - bSize - 2;
    ctx.fillStyle = a.color;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx, by, bSize, bSize, 4);
    else ctx.rect(bx, by, bSize, bSize);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${bSize * 0.6}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(a.number), bx + bSize / 2, by + bSize / 2);
    ctx.restore();
  }

  function buildSidebar() {
    commentList.innerHTML = '';
    annotations.forEach(a => {
      const card = document.createElement('div');
      card.className = 'comment-card';
      card.dataset.id = a.id;
      card.style.borderLeftColor = a.color;

      const commentHtml = a.comment
        ? `<div class="card-comment">${a.comment.replace(/</g,'&lt;')}</div>`
        : `<div class="card-comment"></div>`;

      card.innerHTML = `
        <div class="card-top">
          <div class="card-num">${a.number}</div>
          <div class="card-color-dot" style="background:${a.color}"></div>
          <div class="card-label">주석 #${a.number}</div>
        </div>
        ${commentHtml}
      `;

      card.addEventListener('mouseenter', () => {
        hoveredId = a.id; render(); updateHover();
      });
      card.addEventListener('mouseleave', () => {
        hoveredId = null; render(); updateHover();
      });

      // Feature 1: click card → scroll image to annotation box
      card.addEventListener('click', () => scrollImageToAnnotation(a));

      commentList.appendChild(card);
    });
    annotCount.textContent = `${annotations.length}개`;
  }

  function scrollImageToAnnotation(a) {
    const ch = drawCanvas.height;
    const boxCenterY = (a.y + a.height / 2) * ch;
    const canvasArea = document.getElementById('canvas-area');

    // Position of imageWrapper top relative to canvasArea's scrollable content
    const wrapperTop = imageWrapper.getBoundingClientRect().top
                     - canvasArea.getBoundingClientRect().top
                     + canvasArea.scrollTop;
    const targetScrollTop = wrapperTop + boxCenterY - canvasArea.clientHeight / 2;
    canvasArea.scrollTo({ top: targetScrollTop, behavior: 'smooth' });

    // Flash the box
    hoveredId = a.id; render();
    setTimeout(() => { hoveredId = null; render(); }, 1200);
  }

  function getAnnotationAt(x, y) {
    const cw = drawCanvas.width, ch = drawCanvas.height;
    for (let i = annotations.length - 1; i >= 0; i--) {
      const a = annotations[i];
      if (x >= a.x * cw && x <= (a.x + a.width) * cw &&
          y >= a.y * ch && y <= (a.y + a.height) * ch) return a;
    }
    return null;
  }

  drawCanvas.addEventListener('mousemove', e => {
    const rect = drawCanvas.getBoundingClientRect();
    const found = getAnnotationAt(e.clientX - rect.left, e.clientY - rect.top);
    drawCanvas.style.cursor = found ? 'pointer' : 'default';
    if ((found?.id ?? null) !== hoveredId) {
      hoveredId = found?.id ?? null;
      render();
      updateHover();
    }
  });

  drawCanvas.addEventListener('mouseleave', () => {
    hoveredId = null; render(); updateHover();
  });

  // Click on canvas box → scroll sidebar to card
  drawCanvas.addEventListener('click', e => {
    const rect = drawCanvas.getBoundingClientRect();
    const found = getAnnotationAt(e.clientX - rect.left, e.clientY - rect.top);
    if (!found) return;
    const card = document.querySelector(`.comment-card[data-id="${found.id}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      card.classList.add('highlighted');
      setTimeout(() => card.classList.remove('highlighted'), 1500);
    }
  });

  // Feature 2: scroll image → sidebar follows to nearest visible annotation
  let scrollTimer = null;
  document.getElementById('canvas-area').addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const canvasArea = document.getElementById('canvas-area');
      const ch = drawCanvas.height;

      // Visible mid Y relative to the image top
      const wrapperTop = imageWrapper.getBoundingClientRect().top
                       - canvasArea.getBoundingClientRect().top
                       + canvasArea.scrollTop;
      const visibleMidY = canvasArea.scrollTop + canvasArea.clientHeight / 2 - wrapperTop;

      // Find annotation whose center is closest to the screen midpoint
      let closest = null, minDist = Infinity;
      annotations.forEach(a => {
        const boxCenterY = (a.y + a.height / 2) * ch;
        const dist = Math.abs(boxCenterY - visibleMidY);
        if (dist < minDist) { minDist = dist; closest = a; }
      });

      if (closest) {
        const card = document.querySelector(`.comment-card[data-id="${closest.id}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }, 150);
  });

  function updateHover() {
    document.querySelectorAll('.comment-card').forEach(c => {
      c.classList.toggle('highlighted', Number(c.dataset.id) === hoveredId);
    });
  }
})();
</script>
</body>
</html>
